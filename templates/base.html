<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI Engineer Portfolio{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <canvas id="starfield"></canvas>

    <nav>
        <a href="{{ url_for('index') }}" class="nav-logo">Che Onu</a>
        <div class="nav-links">
            <a href="{{ url_for('index') }}#projects">Projects</a>
            <a href="{{ url_for('index') }}#skills">Skills</a>
            <a href="{{ url_for('index') }}#experience">Experience</a>
            <a href="{{ url_for('index') }}#contact">Contact</a>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>&copy; 2026 Che Onu</p>
    </footer>

    <script>
    (function () {
        const canvas = document.getElementById("starfield");
        const ctx = canvas.getContext("2d");
        let w, h;

        function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener("resize", resize);

        /* --- Static stars --- */
        const stars = [];
        for (let i = 0; i < 200; i++) {
            stars.push({
                x: Math.random() * w,
                y: Math.random() * h,
                r: Math.random() * 1.2 + 0.3,
                alpha: Math.random() * 0.6 + 0.2,
                twinkleSpeed: Math.random() * 0.02 + 0.005,
                twinkleOffset: Math.random() * Math.PI * 2,
            });
        }

        /* --- Shooting stars --- */
        const shooters = [];
        const MAX_SHOOTERS = 3;

        function spawnShooter() {
            const angle = Math.random() * 0.4 + 0.3; // 0.3–0.7 rad
            const speed = Math.random() * 6 + 4;
            shooters.push({
                x: Math.random() * w * 0.8,
                y: Math.random() * h * 0.3,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed,
                life: 1,
                decay: Math.random() * 0.012 + 0.008,
                len: Math.random() * 60 + 40,
            });
        }

        /* --- Draw loop --- */
        let t = 0;
        function draw() {
            ctx.clearRect(0, 0, w, h);
            t += 0.016;

            // Static twinkling stars
            for (const s of stars) {
                const flicker = Math.sin(t * s.twinkleSpeed * 60 + s.twinkleOffset) * 0.3 + 0.7;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(200, 200, 240, ${s.alpha * flicker})`;
                ctx.fill();
            }

            // Shooting stars
            if (Math.random() < 0.008 && shooters.length < MAX_SHOOTERS) {
                spawnShooter();
            }

            for (let i = shooters.length - 1; i >= 0; i--) {
                const s = shooters[i];
                s.x += s.vx;
                s.y += s.vy;
                s.life -= s.decay;

                if (s.life <= 0 || s.x > w + 100 || s.y > h + 100) {
                    shooters.splice(i, 1);
                    continue;
                }

                const tailX = s.x - (s.vx / Math.sqrt(s.vx * s.vx + s.vy * s.vy)) * s.len;
                const tailY = s.y - (s.vy / Math.sqrt(s.vx * s.vx + s.vy * s.vy)) * s.len;

                const grad = ctx.createLinearGradient(tailX, tailY, s.x, s.y);
                grad.addColorStop(0, `rgba(124, 106, 239, 0)`);
                grad.addColorStop(0.6, `rgba(167, 139, 250, ${s.life * 0.4})`);
                grad.addColorStop(1, `rgba(255, 255, 255, ${s.life * 0.9})`);

                ctx.beginPath();
                ctx.moveTo(tailX, tailY);
                ctx.lineTo(s.x, s.y);
                ctx.strokeStyle = grad;
                ctx.lineWidth = 1.5;
                ctx.lineCap = "round";
                ctx.stroke();

                // Glow at head
                ctx.beginPath();
                ctx.arc(s.x, s.y, 2, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${s.life * 0.8})`;
                ctx.fill();
            }

            requestAnimationFrame(draw);
        }
        draw();
    })();
    </script>
</body>
</html>
